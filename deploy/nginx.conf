# /etc/nginx/sites-available/lp2.autoprimetech.com.br
# Subir em: /etc/nginx/sites-enabled/lp2.autoprimetech.com.br (symlink)

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name lp2.autoprimetech.com.br;
    return 301 https://$server_name$request_uri;
}

# HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lp2.autoprimetech.com.br;

    # SSL Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/lp2.autoprimetech.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lp2.autoprimetech.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS (1 ano + preload)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag "all" always;

    # Esconder versão Nginx
    server_tokens off;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Brotli (se módulo instalado)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Limite de upload
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/lp2-access.log;
    error_log /var/log/nginx/lp2-error.log warn;

    # Cache de assets estáticos do Next.js
    location /_next/static/ {
        proxy_cache_valid 200 365d;
        proxy_pass http://127.0.0.1:3210;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /_next/image {
        proxy_cache_valid 200 7d;
        proxy_pass http://127.0.0.1:3210;
        add_header Cache-Control "public, max-age=604800";
    }

    # Robots, sitemap, manifest
    location ~ ^/(robots\.txt|sitemap\.xml|manifest\.webmanifest)$ {
        proxy_pass http://127.0.0.1:3210;
        add_header Cache-Control "public, max-age=3600";
    }

    # Imagens e fontes
    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico|woff|woff2)$ {
        proxy_pass http://127.0.0.1:3210;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # API com sem cache
    location /api/ {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_buffering off;
    }

    # Tudo restante -> Next.js
    location / {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Bloquear arquivos sensíveis
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ \.(env|log|sql|bak|swp)$ {
        deny all;
    }
}
